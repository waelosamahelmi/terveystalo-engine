<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ad.size" content="width=980,height=400">
    <title>980x400 Ad Banner - Suun Terveystalo</title>
    <style>
        /* Terveystalo Display Font */
        @font-face {
            font-family: 'TerveystaloSansDisplay';
            src: url('/font/TerveystaloSansDisplay-Super.woff2') format('woff2'),
                 url('/font/TerveystaloSansDisplay-Super.woff') format('woff');
            font-weight: 900;
            font-style: normal;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: 'TerveystaloSansDisplay', sans-serif;
        }

        /* Main Ad Container */
        .ad-container {
            width: 980px;
            height: 400px;
            background-color: #08091A;
            position: relative;
            overflow: hidden;
            color: #ffffff;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInFromTop {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(50px) rotate(-30deg); }
            to { opacity: 1; transform: translateX(0) rotate(-30deg); }
        }

        @keyframes slideInFromBottom {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: translateY(-50%) scale(0.8); }
            to { opacity: 1; transform: translateY(-50%) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.05); }
        }

        /* --- BACKGROUND GRADIENT --- */
        .background-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #08091A 0%, #1a2d4a 50%, #08091A 100%);
            z-index: 0;
        }

        /* --- MAIN IMAGE (Left Side) --- */
        .main-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 45%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            object-position: center top;
            -webkit-mask-image: linear-gradient(to right, black 50%, transparent 100%);
            mask-image: linear-gradient(to right, black 50%, transparent 100%);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.2s forwards;
        }

        /* --- ARTWORK (Blue Bubbles) - Top Right --- */
        .artwork {
            position: absolute;
            top: -50px;
            right: -80px;
            width: 320px;
            height: 320px;
            z-index: 2;
            object-fit: contain;
            transform: rotate(-25deg);
            opacity: 0;
            animation: slideInFromRight 0.7s ease-out 0.5s forwards;
        }

        /* --- TEXT CONTENT (Top Left/Center) --- */
        .text-area {
            position: absolute;
            z-index: 10;
            top: 50px;
            left: 50px;
            width: 480px;
            text-align: left;
            opacity: 0;
            animation: slideInFromTop 0.6s ease-out 0.1s forwards;
        }

        .headline {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subheadline {
            font-size: 26px;
            line-height: 1.3;
            color: rgba(255,255,255,0.9);
        }

        /* --- PRICE BUBBLE (Left-Center) --- */
        .price-bubble {
            position: absolute;
            z-index: 15;
            top: 50%;
            left: 80px;
            transform: translateY(-50%);
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: slideInFromLeft 0.6s ease-out 0.4s forwards;
        }

        .price-bubble img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .price-bubble-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #004E9A;
        }

        .pb-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
        }

        .pb-price {
            font-size: 68px;
            font-weight: 900;
            line-height: 0.85;
            margin: 6px 0;
            letter-spacing: -3px;
            display: flex;
            align-items: flex-start;
        }

        .pb-currency {
             font-size: 34px;
             margin-top: 6px;
             margin-left: 2px;
        }

        .pb-date {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }

        /* --- CTA BUTTON (Right-Center) --- */
        .cta-button {
            position: absolute;
            z-index: 15;
            top: 50%;
            right: 60px;
            transform: translateY(-50%);
            background-color: #ffffff;
            color: #004E9A;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 18px 42px;
            border-radius: 50px;
            white-space: nowrap;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            opacity: 0;
            animation: scaleIn 0.5s ease-out 0.8s forwards, pulse 2s ease-in-out 2s infinite;
        }

        /* --- ADDRESS FOOTER --- */
        .address {
            position: absolute;
            bottom: 35px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 400;
            z-index: 11;
            color: rgba(255,255,255,0.8);
            opacity: 0;
            animation: slideInFromBottom 0.5s ease-out 1s forwards;
        }

        /* --- DISCLAIMER TEXT --- */
        .disclaimer {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            padding: 0 30px;
            text-align: center;
            font-size: 9px;
            font-weight: 400;
            line-height: 1.3;
            z-index: 11;
            color: rgba(255,255,255,0.6);
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.2s forwards;
        }

    </style>
</head>
<body>

    <div class="ad-container">

        <!-- Background gradient -->
        <div class="background-gradient"></div>

        <!-- Main background image -->
        <img src="{{image_url}}" alt="Dentist" class="main-image">

        <!-- Decorative artwork (blue bubbles) -->
        <img src="{{artwork_url}}" alt="" class="artwork">

        <!-- Text content -->
        <div class="text-area">
            <h1 class="headline">{{headline}}</h1>
            <p class="subheadline">{{subheadline}}</p>
        </div>

        <!-- Price bubble -->
        <div class="price-bubble">
            <img src="/price.svg" alt="">
            <div class="price-bubble-content">
                <span class="pb-title">{{offer_title}}</span>
                <div class="pb-price">{{price}}<span class="pb-currency">€</span></div>
                <span class="pb-date">{{offer_date}}</span>
            </div>
        </div>

        <!-- CTA button -->
        <a href="{{click_url}}" class="cta-button">{{cta_text}}</a>

        <!-- Logo (use image from variable) -->
        <img src="{{logo_url}}" alt="Suun Terveystalo" class="logo" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 150px; height: auto; max-height: 28px; z-index: 10; object-fit: contain; opacity: 0; animation: fadeIn 0.6s ease-out 1.2s forwards;">

        <!-- Address -->
        <div class="address">{{branch_address}}</div>

        <!-- Disclaimer -->
        <div class="disclaimer">{{disclaimer_text}}</div>

    </div>

</body>
</html>
