<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ad.size" content="width=300,height=431">
    <title>300x431 Ad Banner - Suun Terveystalo</title>
    <style>
        /* Terveystalo Display Font */
        @font-face {
            font-family: 'TerveystaloSansDisplay';
            src: url('/font/TerveystaloSansDisplay-Super.woff2') format('woff2'),
                 url('/font/TerveystaloSansDisplay-Super.woff') format('woff');
            font-weight: 900;
            font-style: normal;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: 'TerveystaloSansDisplay', sans-serif;
        }

        /* Main Ad Container */
        .ad-container {
            width: 300px;
            height: 431px;
            background-color: #08091A;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            text-align: center;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInFromTop {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(40px) rotate(-30deg); }
            to { opacity: 1; transform: translateX(0) rotate(-30deg); }
        }

        @keyframes slideInFromBottom {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: translateX(-50%) scale(0.8); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        /* --- MAIN IMAGE (Background Person) --- */
        .main-image {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 280px;
            z-index: 1;
            object-fit: cover;
            object-position: center top;
            -webkit-mask-image: radial-gradient(ellipse 82% 77% at 50% 45%, black 42%, transparent 82%);
            mask-image: radial-gradient(ellipse 82% 77% at 50% 45%, black 42%, transparent 82%);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.2s forwards;
        }

        /* --- ARTWORK (Blue Bubbles) --- */
        .artwork {
            position: absolute;
            bottom: -50px;
            right: -65px;
            width: 220px;
            height: 220px;
            z-index: 2;
            object-fit: contain;
            transform: rotate(-30deg);
            opacity: 0;
            animation: slideInFromRight 0.7s ease-out 0.5s forwards;
        }

        /* --- LOGO --- */
        .logo {
            position: absolute;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: auto;
            max-height: 22px;
            z-index: 10;
            object-fit: contain;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
        }

        /* --- TEXT CONTENT (Top) --- */
        .text-area {
            position: relative;
            z-index: 10;
            padding-top: 28px;
            width: 100%;
            opacity: 0;
            animation: slideInFromTop 0.6s ease-out 0.1s forwards;
        }

        .headline {
            font-size: 18px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .subheadline {
            font-size: 12px;
            line-height: 1.35;
            max-width: 90%;
            margin: 0 auto;
        }


        /* --- PRICE BUBBLE (Left Aligned) --- */
        .price-bubble {
            position: absolute;
            z-index: 15;
            top: 185px;
            left: 10px;
            width: 105px;
            height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: slideInFromLeft 0.6s ease-out 0.4s forwards;
        }

        .price-bubble img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .price-bubble-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #004E9A;
        }

        .pb-title {
            font-size: 10px;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
        }

        .pb-price {
            font-size: 40px;
            font-weight: 900;
            line-height: 0.9;
            margin: 3px 0;
            letter-spacing: -1px;
            display: flex;
            align-items: flex-end;
        }

        .pb-currency {
             font-size: 15px;
             align-self: flex-end;
             margin-left: 1px;
        }

        .pb-date {
            font-size: 7px;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }


        /* --- CTA BUTTON (Bottom Center) --- */
        .cta-button {
            position: absolute;
            z-index: 15;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #004E9A;
            text-decoration: none;
            font-weight: 700;
            font-size: 11px;
            padding: 10px 24px;
            border-radius: 22px;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 0;
            animation: scaleIn 0.5s ease-out 0.8s forwards, pulse 2s ease-in-out 2s infinite;
        }


        /* --- ADDRESS FOOTER --- */
        .address {
            position: absolute;
            bottom: 24px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            font-weight: 400;
            z-index: 11;
            color: #fff;
            opacity: 0;
            animation: slideInFromBottom 0.5s ease-out 1s forwards;
        }

        /* --- DISCLAIMER --- */
        .disclaimer {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            padding: 0 10px;
            text-align: center;
            font-size: 6px;
            font-weight: 400;
            line-height: 1.2;
            z-index: 11;
            color: rgba(255,255,255,0.6);
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.2s forwards;
        }

    </style>
</head>
<body>

    <div class="ad-container">

        <!-- Main background image (man or woman) -->
        <img src="{{image_url}}" alt="Dentist" class="main-image">

        <!-- Decorative artwork (blue bubbles) -->
        <img src="{{artwork_url}}" alt="" class="artwork">

        <div class="text-area">
            <h1 class="headline">{{headline}}</h1>
            <p class="subheadline">{{subheadline}}</p>
        </div>

        <div class="price-bubble">
            <img src="/price.svg" alt="">
            <div class="price-bubble-content">
                <span class="pb-title">{{offer_title}}</span>
                <div class="pb-price">{{price}}<span class="pb-currency">€</span></div>
                <span class="pb-date">{{offer_date}}</span>
            </div>
        </div>

        <a href="{{click_url}}" class="cta-button">{{cta_text}}</a>

        <!-- Suun Terveystalo Logo -->
        <img src="{{logo_url}}" alt="Suun Terveystalo" class="logo">

        <div class="address">{{branch_address}}</div>

        <div class="disclaimer">{{disclaimer_text}}</div>

    </div>

</body>
</html>
