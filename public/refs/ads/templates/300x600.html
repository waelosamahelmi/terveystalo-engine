<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300x600 Ad Banner - Suun Terveystalo</title>
    <style>
        /* Terveystalo Font */
        @font-face {
            font-family: 'TerveystaloSans';
            src: url('/font/TerveystaloSans-Regular.woff2') format('woff2'),
                 url('/font/TerveystaloSans-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'TerveystaloSans';
            src: url('/font/TerveystaloSans-SemiBold.woff2') format('woff2'),
                 url('/font/TerveystaloSans-SemiBold.woff') format('woff');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'TerveystaloSans';
            src: url('/font/TerveystaloSans-Bold.woff2') format('woff2'),
                 url('/font/TerveystaloSans-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: 'TerveystaloSans', sans-serif;
        }

        /* Main Ad Container */
        .ad-container {
            width: 300px;
            height: 600px;
            background-color: #08091A;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            text-align: center;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInFromTop {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(50px) rotate(-30deg); }
            to { opacity: 1; transform: translateX(0) rotate(-30deg); }
        }

        @keyframes slideInFromBottom {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: translateX(-50%) scale(0.8); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        /* --- MAIN IMAGE (Background Person) --- */
        .main-image {
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            height: 400px;
            z-index: 1;
            object-fit: cover;
            object-position: center top;
            -webkit-mask-image: radial-gradient(ellipse 82% 77% at 50% 45%, black 42%, transparent 82%);
            mask-image: radial-gradient(ellipse 82% 77% at 50% 45%, black 42%, transparent 82%);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.2s forwards;
        }

        /* --- ARTWORK (Blue Bubbles) --- */
        .artwork {
            position: absolute;
            bottom: -70px;
            right: -90px;
            width: 306px;
            height: 306px;
            z-index: 2;
            object-fit: contain;
            transform: rotate(-30deg);
            opacity: 0;
            animation: slideInFromRight 0.7s ease-out 0.5s forwards;
        }

        /* --- LOGO --- */
        .logo {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
            max-height: 32px;
            z-index: 10;
            object-fit: contain;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
        }

        /* --- TEXT CONTENT (Top) --- */
        .text-area {
            position: relative;
            z-index: 10;
            padding-top: 40px;
            width: 100%;
            opacity: 0;
            animation: slideInFromTop 0.6s ease-out 0.1s forwards;
        }

        .headline {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .subheadline {
            font-size: 16px;
            line-height: 1.35;
            max-width: 90%;
            margin: 0 auto;
        }


        /* --- PRICE BUBBLE (Left Aligned) --- */
        .price-bubble {
            position: absolute;
            z-index: 15;
            top: 260px; 
            left: 15px;
            background-color: #ffffff;
            color: #004E9A;
            width: 135px;
            height: 135px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            animation: slideInFromLeft 0.6s ease-out 0.4s forwards;
        }

        .pb-title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
        }

        .pb-price {
            font-size: 54px;
            font-weight: 900;
            line-height: 0.9;
            margin: 4px 0;
            letter-spacing: -2px;
            display: flex;
            align-items: flex-start;
        }
        
        .pb-currency {
             font-size: 28px;
             margin-top: 4px;
             margin-left: 2px;
        }

        .pb-date {
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }


        /* --- CTA BUTTON (Bottom Center) --- */
        .cta-button {
            position: absolute;
            z-index: 15;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #004E9A;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 32px;
            border-radius: 25px;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            opacity: 0;
            animation: scaleIn 0.5s ease-out 0.8s forwards, pulse 2s ease-in-out 2s infinite;
        }


        /* --- ADDRESS FOOTER --- */
        .address {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            z-index: 11;
            color: #fff;
            opacity: 0;
            animation: slideInFromBottom 0.5s ease-out 1s forwards;
        }

    </style>
</head>
<body>

    <div class="ad-container">
        
        <!-- Main background image (man or woman) -->
        <img src="refs/assets/nainen.jpg" alt="Dentist" class="main-image">
        
        <!-- Decorative artwork (blue bubbles) -->
        <img src="refs/assets/terveystalo-artwork.png" alt="" class="artwork">
        
        <div class="text-area">
            <h1 class="headline">Hymyile.<br>Olet hyvissä käsissä.</h1>
            <p class="subheadline">Sujuvampaa suunterveyttä Lahden Suun Terveystalossa.</p>
        </div>

        <div class="price-bubble">
            <span class="pb-title">Hammas-<br>tarkastus</span>
            <div class="pb-price">49<span class="pb-currency">€</span></div>
            <span class="pb-date">Varaa viimeistään<br>28.10.</span>
        </div>

        <a href="#" class="cta-button">Varaa aika</a>

        <!-- Suun Terveystalo Logo -->
        <img src="refs/assets/SuunTerveystalo_logo.png" alt="Suun Terveystalo" class="logo">
        
        <div class="address">Torikatu 1, Lahti</div>

    </div>

</body>
</html>
