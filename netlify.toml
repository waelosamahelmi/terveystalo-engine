[build]
  command = "npm run build"
  publish = "dist"

# CORS headers for font files (needed for srcDoc iframe previews)
[[headers]]
  for = "/font/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[functions]
  directory = "functions"

[functions."syncApartments-background"]
schedule = "0 */6 * * *"

[functions."sync-media-costs-background"]
schedule = "40 17 * * *"  # Run at 7:00 PM every day

[functions."syncMediaScreens-background"]
schedule = "0 3 * * *"  # Run at 3:00 AM every day