[build]
  command = "npm run build"
  publish = "dist"

# CORS headers for font files (needed for srcDoc iframe previews)
[[headers]]
  for = "/font/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[functions]
  directory = "netlify/functions"

# BidTheatre sync - runs every hour at :40
[functions."sync-media-costs-background"]
schedule = "40 * * * *"

# Media screens sync - runs daily at 3:00 AM
[functions."syncMediaScreens-background"]
schedule = "0 3 * * *"

# Historical media costs sync (manual trigger)
[functions."sync-historical-media-costs-background"]